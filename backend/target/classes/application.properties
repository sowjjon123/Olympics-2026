# ============================
# Server
# ============================
server.port=8080

# ============================
# Database
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/sports_progression?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sowjjon
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ============================
# Data Initialization
# ============================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ============================
# JWT Configuration
# ============================
app.jwt.secret=SportsProgressionSecretKeyForJWTSigningMustBe256BitsLongAtMinimum
app.jwt.expiration-ms=86400000

# ============================
# Logging
# ============================
logging.level.com.sports=INFO
logging.level.org.springframework.security=WARN
